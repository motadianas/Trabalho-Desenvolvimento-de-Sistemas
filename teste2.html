<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CSS Grid em um único arquivo</title>

    <!-- CSS dentro do HTML -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 200px 1fr;
            grid-template-rows: 80px 1fr 60px;
            gap: 2px;
            height: 100vh;
        }

        .header {
            grid-column: 1 / 3;
            background-color: #046408;
            color: rgb(183, 222, 6);
            padding: 20px;
        }

        .menu {
            background-color: #a35252;
            color: rgb(120, 5, 5);
            padding: 20px;
        }

        .content {
            background-color: #e24aa8a7;
            color: rgb(97, 3, 62);
            padding: 20px;
        }

        .footer {
            grid-column: 1 / 3;
            background-color: #05eff77e;
            color: rgb(7, 58, 188);
            padding: 20px;
        }
    </style>
</head>

<body>

    <div class="grid-container">
        <header class="header">Cabeçalho</header>
        <nav class="menu">Menu Lateral</nav>
        <main class="content">Conteúdo Principal</main>
        <footer class="footer">Rodapé</footer>
    </div>

</body>
</html>
